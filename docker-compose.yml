services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////app/data/budget_tracker.db
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: 10
      FRONTEND_ORIGIN: http://localhost:5173
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
